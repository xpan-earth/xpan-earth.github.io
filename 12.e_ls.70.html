<!doctype html>
<html lang="es" data-xpan>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="color-scheme" content="light dark"/>
<title>xpan.12.e — ls.70</title>

<style>
[data-xpan]{
  --bg:#000;
  --fg:#E0E3E6;
  --fg-dim:#AEB4BA;
  --accent:#1860FF;
  --line:#2A2E31;

  /* CLAVE */
  --font-ui: "Times New Roman", Times, serif;
}

@media (prefers-color-scheme:light){
  [data-xpan]{ --bg:#fff; --fg:#0E1113; --fg-dim:#4A5158; --line:#D9DEE2; }
}

*,*::before,*::after{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:var(--font-ui);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  text-align:center;
}

/* header */
header{position:absolute;top:16px;left:16px}
header img{width:44px}

/* layout */
main{
  width:100%;
  max-width:760px;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* ESTO ES CLAVE */
h1{
  margin:0;
  text-transform:lowercase;
  font-family:var(--font-ui);
  font-size:1.4rem;
  font-weight:400; /* no bold */
}

h1 em{
  font-style:italic;
}

p{
  margin:0;
  color:var(--fg-dim);
  font-family:var(--font-ui);
  font-size:0.95rem;
  line-height:1.5;
}

/* imagen */
.portada{
  width:260px;
  object-fit:contain;
}

/* form */
form{
  width:100%;
  max-width:380px;
  display:grid;
  gap:12px;
}

label{
  color:var(--fg-dim);
  text-transform:lowercase;
  font-family:var(--font-ui);
  font-weight:400;
}

input,select{
  width:100%;
  padding:.5rem;
  border:1px solid var(--line);
  background:transparent;
  color:var(--fg);
  font-family:var(--font-ui);
  font-size:0.9rem;
}

button{
  border:1px solid var(--accent);
  background:transparent;
  color:var(--fg);
  padding:.5rem;
  font-family:var(--font-ui);
  cursor:pointer;
}

#formNote{
  color:var(--fg-dim);
  font-family:var(--font-ui);
}
</style>
</head>

<body>

<header>
  <a href="https://xpan.earth">
    <img src="./xpan.svg">
  </a>
</header>

<main>

<p>
  <a href="https://xpan.earth/arq.xpan.12e.html" target="_blank" style="color:var(--accent);text-decoration:none;">
    <em>xpan.12.e</em>
  </a> presenta<br>
  <em>ls.70</em> [sesión de escucha n.º 70]
</p>

<p>
  [album] ep<br>
  [artista] lilen<br>
  [año] 2026<br>
  [fecha] 30.03.26 / 17:00 — 18:00 hrs<br>
  [ubicación] <em>proyectos públicos</em>
</p>

<img class="portada"
src="https://d2w9rnfcy7mm78.cloudfront.net/44786144/original_d8a8ebb1e17efa288f15661e02102723.jpg?1774560509?bc=0">

<form action="https://script.google.com/macros/s/AKfycbwa8gSfG_hWuax6J_YghCkbXYtxv2np28jz6rFh0jAddzHL2voje2DUGGKtpkRc1rUm/exec" method="post">

<label>nombre completo:</label>
<input name="nombre" id="nombre" required>

<label>correo electrónico:</label>
<input name="correo" id="correo" type="email" required>

<label>horario:</label>
<select name="horario" id="horario" required>
<option value="">elige horario</option>
<option value="17:00">17:00 hrs</option>
<option value="18:00">18:00 hrs</option>
</select>

<input type="hidden" name="user_agent" id="ua">
<input type="hidden" name="page" id="page">

<p id="formNote"></p>

<button type="submit" id="btnSubmit">enviar</button>

</form>

</main>

<script>
document.getElementById("ua").value=navigator.userAgent;
document.getElementById("page").value=location.href;

const form=document.querySelector("form");
const btn=document.getElementById("btnSubmit");
const note=document.getElementById("formNote");

form.addEventListener("submit",async(e)=>{
e.preventDefault();

const nombre=document.getElementById("nombre").value.trim();
const correo=document.getElementById("correo").value.trim();
const horario=document.getElementById("horario").value;

if(!nombre||!correo||!horario){
note.textContent="completa todos los campos";
return;
}

btn.disabled=true;
note.textContent="procesando…";

try{
const res=await fetch(form.action,{method:"POST",body:new FormData(form)});
const data=await res.json();

if(data.status==="full"){
note.textContent="horario lleno";
}else if(data.ok){
note.textContent="registro confirmado";
form.reset();
}else{
note.textContent="error";
}

}catch{
note.textContent="error de red";
}

btn.disabled=false;
});
</script>

</body>
</html>
