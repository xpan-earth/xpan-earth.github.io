name: publicar ediciones

on:
  schedule:
    - cron: "0 2,16,21 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: reconstruir edición cerrada
        env:
          DERIVA_SITE_URL: ${{ secrets.DERIVA_SITE_URL }}
        run: curl --fail --retry 2 --max-time 90 "$DERIVA_SITE_URL/api/editions?refresh=1"
